<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 960 960" width="24px">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="15" dy="25" stdDeviation="20" flood-opacity="0.3" flood-color="#000000"/>
    </filter>

    <!-- Red Gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5B5B" />
      <stop offset="40%" stop-color="#FF2E2E" />
      <stop offset="100%" stop-color="#B80000" />
    </linearGradient>

    <!-- Yellow Gradient -->
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE66D" />
      <stop offset="40%" stop-color="#FFD11A" />
      <stop offset="100%" stop-color="#CC9900" />
    </linearGradient>

    <!-- Glossy Overlay Gradient -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Pill Group with shadow and rotation -->
  <g filter="url(#shadow)" transform="rotate(-45 480 480)">
    <!-- Yellow Half (Left) -->
    <path d="M 480 370 L 340 370 A 110 110 0 0 0 340 590 L 480 590 Z" fill="url(#yellowGrad)" />

    <!-- Red Half (Right) -->
    <path d="M 480 590 L 620 590 A 110 110 0 0 0 620 370 L 480 370 Z" fill="url(#redGrad)" />

    <!-- Joint line/shadow between the two halves -->
    <line x1="480" y1="370" x2="480" y2="590" stroke="#000000" stroke-opacity="0.15" stroke-width="4" />

    <!-- Glossy Shine Overlay -->
    <path d="M 300 410 C 320 395 340 390 370 390 L 590 390 C 620 390 640 395 660 410 C 630 400 600 398 570 398 L 390 398 C 360 398 330 400 300 410 Z" fill="url(#glossGrad)" />
    
    <!-- Highlight Sparkle Line (Stroke-based shine) -->
    <path d="M 320 415 A 70 70 0 0 1 360 400 L 600 400 A 70 70 0 0 1 640 415" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-opacity="0.5" />
  </g>
</svg>